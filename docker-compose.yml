services:
  postgres:
    image: postgres:16-alpine
    container_name: coparentes-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: coparentes
    volumes:
      - coparentes_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d coparentes"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  coparentes_pg_data:

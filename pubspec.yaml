name: coparentes
description: coparentes - AI-first co-parenting app for Poland
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: 6.1.5+1
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0
  http: 1.5.0
  intl: 0.20.2
  table_calendar: ^3.2.0
  fl_chart: 0.69.0
  image_picker: 1.1.2
  file_picker: 8.1.7
  path_provider: 2.1.5
  uuid: 4.5.1
  crypto: 3.0.6
  share_plus: 10.1.4
  url_launcher: 6.3.1
  permission_handler: 11.4.0
  cached_network_image: 3.4.1
  shimmer: 3.0.0
  timeline_tile: 2.0.0
  dotted_border: 2.1.0
  flutter_slidable: 3.1.1
  badges: 3.1.2
  percent_indicator: 4.2.3
  cupertino_icons: 1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/branding/

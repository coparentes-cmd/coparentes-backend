services:
  - type: web
    name: coparentes-backend
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: SESSION_TTL_DAYS
        value: 30
      - key: SEED_DEMO_DATA
        value: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
